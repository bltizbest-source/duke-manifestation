name: Deploy to Dokploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy webhook
        env:
          DOKPLOY_DEPLOY_HOOK_URL: ${{ secrets.DOKPLOY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DOKPLOY_DEPLOY_HOOK_URL" ]; then
            echo "DOKPLOY_DEPLOY_HOOK_URL secret is not set."
            exit 1
          fi
          curl -fsSL -X POST "$DOKPLOY_DEPLOY_HOOK_URL"

